<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin | M7 Marcenaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-container {
      width: 100%;
      max-width: 480px;
      padding: 2rem;
    }

    .admin-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .admin-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #c9a96e;
      letter-spacing: 0.05em;
    }

    .admin-header p {
      color: #888;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .admin-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 2rem;
    }

    .admin-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #999;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #c9a96e;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: #c9a96e;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background: #b8944f;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>M7 MARCENARIA</h1>
      <p>Painel Administrativo</p>
    </div>
    <div class="admin-card">
      <h2>Entrar</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="user">Usuário</label>
          <input type="text" id="user" name="user" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="pass">Senha</label>
          <input type="password" id="pass" name="pass" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">Acessar</button>
        <p class="error-msg" id="errorMsg">Usuário ou senha incorretos.</p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    // SHA-256 hash no navegador
    async function sha256(message) {
      var msgBuffer = new TextEncoder().encode(message);
      var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    // Garante que a URL termina com / para resolver caminhos relativos corretamente
    if (!window.location.pathname.endsWith('/') && !window.location.pathname.endsWith('.html')) {
      window.location.replace(window.location.pathname + '/' + window.location.search);
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = this.querySelector('button');
      var errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Verificando...';

      try {
        var user = document.getElementById('user').value.trim();
        var pass = document.getElementById('pass').value;
        var hash = await sha256(pass);

        var { data, error } = await supabase
          .from('admin_users')
          .select('id')
          .eq('username', user)
          .eq('password_hash', hash)
          .single();

        if (data) {
          sessionStorage.setItem('m7_admin_auth', 'true');
          window.location.href = 'painel.html';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Acessar';
    });
  </script>
</body>
</html>
