<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambiente | M7 Marcenaria</title>
  <meta name="description" content="Projetos de marcenaria - M7 Marcenaria">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,200..700;1,9..40,200..700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Ambiente page specific styles */
    .ambiente-hero {
      position: relative;
      height: auto;
      min-height: 100px;
      padding-top: 80px;
      padding-bottom: 20px;
      overflow: hidden;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ambiente-hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
    }

    .ambiente-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(13,13,13,0.4) 0%, rgba(13,13,13,0.8) 100%);
    }

    .ambiente-hero-content {
      position: relative;
      text-align: center;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ambiente-hero-content h1 {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 400;
      margin-bottom: 8px;
    }

    .ambiente-hero-content .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      transition: opacity 0.3s;
    }

    .ambiente-hero-content .back-link:hover {
      opacity: 0.7;
    }

    /* Photos section */
    .fotos-section {
      padding: clamp(32px, 4vw, 48px) 0;
      background: var(--cream);
    }

    .fotos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .fotos-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      cursor: pointer;
      border-radius: 8px;
      transition: transform 0.3s var(--ease), box-shadow 0.3s;
      box-shadow: var(--shadow-sm);
    }

    .fotos-grid img:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-md);
    }

    .no-photos {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-500);
      font-size: 16px;
    }

    .ambiente-description {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 24px;
      font-size: 16px;
      color: var(--gray-500);
      line-height: 1.8;
      font-weight: 300;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 85vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      color: #fff;
      background: rgba(0,0,0,0.5);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-close:hover {
      opacity: 1;
      background: rgba(0,0,0,0.7);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      transition: opacity 0.2s, background 0.2s;
    }

    .lightbox-nav:hover {
      opacity: 1;
      background: rgba(0,0,0,0.7);
    }

    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    .lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .projeto-header {
        padding: 24px 20px 16px;
      }
      .projeto-images {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Header (same as main site) -->
  <header id="header" class="scrolled">
    <div class="container header-inner">
      <a href="/" class="logo-link">
        <img src="" alt="M7 Marcenaria" class="logo" id="siteLogo">
        <div class="logo-texto">
          <span class="logo-nome">m7</span>
          <span class="logo-destaque">MARCENARIA</span>
        </div>
      </a>
      <nav id="nav">
        <a href="/" class="nav-link">Início</a>
        <a href="/#sobre" class="nav-link">Sobre</a>
        <a href="/#trabalhos" class="nav-link active">Trabalhos</a>
        <a href="/#contato" class="nav-link">Contato</a>
        <a href="#" target="_blank" class="nav-cta" id="navWhatsapp">
          <span class="nav-cta-icon">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.558 4.143 1.534 5.886L.058 23.65l5.9-1.547A11.93 11.93 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.978 0-3.81-.563-5.365-1.535l-.385-.23-3.498.917.935-3.412-.252-.4A9.772 9.772 0 012.18 12 9.82 9.82 0 0112 2.18 9.82 9.82 0 0121.82 12 9.82 9.82 0 0112 21.82z"/></svg>
          </span>
          Orçamento
        </a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="ambiente-hero">
    <img src="" alt="" class="ambiente-hero-bg" id="ambienteHeroBg">
    <div class="ambiente-hero-overlay"></div>
    <div class="ambiente-hero-content">
      <a href="/#trabalhos" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Voltar
      </a>
      <h1 id="ambienteName">Carregando...</h1>
    </div>
  </section>

  <!-- Fotos -->
  <section class="fotos-section">
    <div class="container">
      <p class="ambiente-description" id="ambienteDesc"></p>
      <div class="fotos-grid" id="fotosGrid">
        <div class="no-photos">Carregando fotos...</div>
      </div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-nav lightbox-prev">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img src="" alt="" id="lightboxImg">
    <button class="lightbox-nav lightbox-next">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <!-- Footer (simplified) -->
  <footer>
    <div class="footer-bottom">
      <div class="container footer-bottom-inner">
        <p>&copy; 2026 <span class="brand-m7">m7</span> <span class="brand-marcenaria">MARCENARIA</span>. Todos os direitos reservados.</p>
        <p class="footer-credits">Powered by Rory Systems</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script>
    (function () {
      'use strict';

      // Get slug from URL path: /ambiente/slug/ or fallback to ?id=
      var slug = null;
      var envId = null;
      var pathParts = window.location.pathname.replace(/\/+$/, '').split('/');
      var lastPart = pathParts[pathParts.length - 1];

      if (lastPart && lastPart !== 'ambiente' && lastPart !== 'ambiente.html') {
        slug = decodeURIComponent(lastPart);
      } else {
        var params = new URLSearchParams(window.location.search);
        envId = params.get('id');
      }

      if (!slug && !envId) {
        window.location.href = '/';
        return;
      }

      // Load settings for header
      async function loadSiteSettings() {
        try {
          var { data } = await supabase.from('site_settings').select('*').limit(1).single();
          if (!data) return;

          var logo = document.getElementById('siteLogo');
          if (data.logo_url) logo.src = data.logo_url;
          else logo.style.display = 'none';

          if (data.whatsapp) {
            document.getElementById('navWhatsapp').href = 'https://wa.me/' + data.whatsapp;
          }
        } catch (e) {}
      }

      // Load environment and its photos
      async function loadAmbiente() {
        try {
          var query = supabase.from('environments').select('*');
          if (slug) {
            query = query.eq('slug', slug);
          } else {
            query = query.eq('id', envId);
          }
          var { data: env } = await query.single();

          if (!env) {
            window.location.href = '/';
            return;
          }

          envId = env.id;

          document.title = env.name + ' | M7 Marcenaria';
          document.getElementById('ambienteName').textContent = env.name;

          if (env.cover_image_url) {
            document.getElementById('ambienteHeroBg').src = env.cover_image_url;
          }

          if (env.description) {
            document.getElementById('ambienteDesc').textContent = env.description;
          }

          // Load photos
          var { data: images } = await supabase
            .from('environment_images')
            .select('id, image_url, is_cover')
            .eq('environment_id', envId)
            .order('is_cover', { ascending: false })
            .order('created_at', { ascending: true });

          var grid = document.getElementById('fotosGrid');

          if (!images || images.length === 0) {
            grid.innerHTML = '<div class="no-photos">Nenhuma foto encontrada neste ambiente.</div>';
            return;
          }

          grid.innerHTML = '';
          images.forEach(function (img) {
            var imgEl = document.createElement('img');
            imgEl.src = img.image_url;
            imgEl.alt = env.name;
            imgEl.onclick = function () { openLightbox(img.image_url); };
            grid.appendChild(imgEl);
          });
        } catch (err) {
          console.error('Ambiente load error:', err);
          document.getElementById('fotosGrid').innerHTML =
            '<div class="no-photos">Erro ao carregar ambiente.</div>';
        }
      }

      loadSiteSettings();
      loadAmbiente();

      // Lightbox with navigation
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightboxImg');
      var lightboxCounter = document.getElementById('lightboxCounter');
      var lightboxImages = [];
      var lightboxIndex = 0;

      function showLightboxImage(index) {
        if (index < 0) index = lightboxImages.length - 1;
        if (index >= lightboxImages.length) index = 0;
        lightboxIndex = index;
        lightboxImg.src = lightboxImages[index];
        lightboxCounter.textContent = (index + 1) + ' / ' + lightboxImages.length;
      }

      window.openLightbox = function (src) {
        // Build image list from grid
        lightboxImages = [];
        document.querySelectorAll('#fotosGrid img').forEach(function (img) {
          lightboxImages.push(img.src);
        });
        lightboxIndex = lightboxImages.indexOf(src);
        if (lightboxIndex === -1) lightboxIndex = 0;
        showLightboxImage(lightboxIndex);
        lightbox.classList.add('active');
      };

      document.querySelector('.lightbox-prev').addEventListener('click', function (e) {
        e.stopPropagation();
        showLightboxImage(lightboxIndex - 1);
      });

      document.querySelector('.lightbox-next').addEventListener('click', function (e) {
        e.stopPropagation();
        showLightboxImage(lightboxIndex + 1);
      });

      lightbox.addEventListener('click', function (e) {
        if (e.target !== lightboxImg && !e.target.closest('.lightbox-nav')) {
          lightbox.classList.remove('active');
        }
      });

      // Keyboard navigation
      document.addEventListener('keydown', function (e) {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowLeft') showLightboxImage(lightboxIndex - 1);
        if (e.key === 'ArrowRight') showLightboxImage(lightboxIndex + 1);
        if (e.key === 'Escape') lightbox.classList.remove('active');
      });
    })();
  </script>
</body>
</html>
